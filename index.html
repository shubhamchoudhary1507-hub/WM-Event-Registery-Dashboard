<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Workmates Executive Leadership Forum</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,sans-serif;background:#F7F4EF;color:#1B3A4B;min-height:100vh;}
.wrap{max-width:1200px;margin:0 auto;padding:28px 24px 60px;}
.eyebrow{font-size:11px;font-weight:700;color:#FF6A39;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
h1{font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
.subtitle{font-size:13px;color:#7C8A93;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
.city-select-wrap{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #E7E2DA;border-radius:10px;padding:9px 13px;}
.city-select-wrap select{border:none;background:transparent;font-size:13.5px;font-weight:600;color:#1B3A4B;cursor:pointer;font-family:inherit;}
.city-select-wrap select:focus{outline:none;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:18px;}
.card{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #E7E2DA;box-shadow:0 1px 2px rgba(27,58,75,.04);}
.card-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#7C8A93;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.card-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.card-value{font-size:32px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.02em;color:#1B3A4B;margin-bottom:4px;}
.card-sub{font-size:12px;color:#94A0A8;}
.progress-wrap{background:#fff;border:1px solid #E7E2DA;border-radius:14px;padding:14px 18px;margin-bottom:18px;}
.progress-meta{display:flex;justify-content:space-between;font-size:12.5px;color:#7C8A93;margin-bottom:8px;}
.progress-meta span:last-child{font-weight:600;color:#1B3A4B;}
.progress-track{height:10px;background:#F0ECE4;border-radius:6px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,#FF6A39,#E8B339);border-radius:6px;transition:width .5s ease;}
.charts-row{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px;}
.charts-row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-box{background:#fff;border:1px solid #E7E2DA;border-radius:14px;padding:18px 20px;}
.chart-title{font-size:13.5px;font-weight:600;margin-bottom:14px;color:#1B3A4B;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-label{font-size:12px;color:#1B3A4B;width:110px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-label.left{text-align:left;width:140px;}
.bar-track{flex:1;height:20px;background:#F0ECE4;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width .4s ease;}
.bar-count{font-size:12px;font-weight:600;color:#7C8A93;width:28px;text-align:right;flex-shrink:0;}
.trend-wrap{width:100%;overflow:hidden;}
svg.trend{width:100%;height:180px;}
.companies-list{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;}
.company-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;}
.company-name{color:#1B3A4B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;}
.company-badge{font-size:11px;font-weight:600;color:#FF6A39;background:#FFEDE5;border-radius:5px;padding:1px 7px;flex-shrink:0;}
.companies-count{font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#1B3A4B;margin-bottom:12px;}
.table-box{background:#fff;border:1px solid #E7E2DA;border-radius:14px;padding:18px 20px;}
.table-header-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.table-title{font-size:13.5px;font-weight:600;}
.search-wrap{position:relative;}
.search-wrap input{padding:7px 10px 7px 32px;font-size:12.5px;border:1px solid #E7E2DA;border-radius:8px;width:240px;font-family:inherit;color:#1B3A4B;}
.search-wrap input:focus{outline:2px solid #FF6A39;outline-offset:1px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94A0A8;font-size:13px;pointer-events:none;}
.table-scroll{max-height:380px;overflow-y:auto;}
table{border-collapse:collapse;width:100%;}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:#7C8A93;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #E7E2DA;background:#fff;position:sticky;top:0;}
td{text-align:left;padding:9px 12px;font-size:13px;color:#1B3A4B;border-bottom:1px solid #F0ECE4;}
tr:hover td{background:#FBF9F5;}
td.muted{color:#94A0A8;}
@media(max-width:820px){.charts-row,.charts-row2{grid-template-columns:1fr;}.cards{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header-row">
    <div>
      <div class="eyebrow">Workmates Executive Leadership Forum</div>
      <h1>Registration Tracker</h1>
      <div class="subtitle">
        <span id="ts-label">Last updated: 8 Jul 2026</span>
      </div>
    </div>
    <div class="city-select-wrap">
      <span style="font-size:15px">&#128205;</span>
      <select id="city-filter" onchange="render()">
        <option value="All">All cities</option>
      </select>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Progress to 800 registrations</span>
      <span id="prog-label"></span>
    </div>
    <div class="progress-track"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="charts-row">
    <div class="chart-box">
      <div class="chart-title">Registrations over time</div>
      <div class="trend-wrap" id="trend-wrap"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">By city</div>
      <div id="city-bars"></div>
    </div>
  </div>

  <div class="charts-row2">
    <div class="chart-box">
      <div class="chart-title">What attendees are evaluating</div>
      <div id="init-bars"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Companies registered</div>
      <div class="companies-count" id="comp-count"></div>
      <div class="companies-list" id="comp-list"></div>
    </div>
  </div>

  <div class="charts-row2">
    <div class="chart-box">
      <div class="chart-title">Top designations</div>
      <div id="desig-bars"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Designation breakdown</div>
      <div class="companies-count" id="desig-count"></div>
      <div class="companies-list" id="desig-list"></div>
    </div>
  </div>

  <div class="table-box">
    <div class="table-header-row">
      <div class="table-title" id="table-title">Registrant list</div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search" placeholder="Search name, company or email" oninput="render()"/>
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>Name</th><th>City</th><th>Company</th><th>Designation</th><th>Email</th><th>Date</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

function parseDate(s){
  if(!s)return null;
  const m=s.match(/(\d{1,2})-([A-Za-z]{3})-(\d{4})/);
  if(!m)return null;
  const mo={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  return new Date(parseInt(m[3]),mo[m[2]],parseInt(m[1]));
}
function fmtDate(d){return d?d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):''}

function computeStats(records,city){
  const work=city==='All'?records:records.filter(r=>(r.city||'').trim()===city);
  const seen=new Map();
  work.forEach(r=>{const k=(r.email||'').trim().toLowerCase();if(k&&!seen.has(k))seen.set(k,r);});
  const uniq=Array.from(seen.values());
  const cityCounts={};
  uniq.forEach(r=>{const c=(r.city||'Unspecified').trim()||'Unspecified';cityCounts[c]=(cityCounts[c]||0)+1;});
  const compCounts={};
  uniq.forEach(r=>{const c=(r.company||'Unspecified').trim()||'Unspecified';compCounts[c]=(compCounts[c]||0)+1;});
  const initCounts={};
  uniq.forEach(r=>{(r.initiatives||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(t=>{initCounts[t]=(initCounts[t]||0)+1;});});
  const dayCounts={};
  uniq.forEach(r=>{
    const d=parseDate(r.addedTime);if(!d)return;
    const k=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    if(!dayCounts[k])dayCounts[k]={key:k,ts:d.getTime(),count:0};
    dayCounts[k].count++;
  });
  let cum=0;
  const trend=Object.values(dayCounts).sort((a,b)=>a.ts-b.ts).map(d=>{cum+=d.count;return{...d,cum};});
  const desigCounts={};
  uniq.forEach(r=>{
    const d=(r.designation||'').trim();if(!d)return;
    const n=d.toUpperCase();
    let label=d;
    if(n.includes('CTO'))label='CTO';
    else if(n.includes('CEO'))label='CEO';
    else if(n.includes('CIO'))label='CIO';
    else if(n.includes('DIRECTOR'))label='Director';
    else if(n==='IT HEAD'||n==='HEAD IT'||n.includes('IT INFRA HEAD')||n.includes('HEAD - IT'))label='IT Head';
    else if(n==='IT MANAGER'||n==='MANAGER IT'||n==='MANAGER-IT'||n==='MANAGER (IT)')label='IT Manager';
    else if(n.includes('CLOUD'))label='Cloud Engineer';
    else if(n.includes('SOFTWARE ENGINEER')||n.includes('SR. SOFTWARE'))label='Software Engineer';
    else if(n.includes('SYSTEM ADMIN'))label='System Administrator';
    else if(n.includes('ASSISTANT MANAGER')||n.includes('ASST. MANAGER'))label='Assistant Manager';
    else if(n==='MANAGER')label='Manager';
    desigCounts[label]=(desigCounts[label]||0)+1;
  });
  const dates=uniq.map(r=>parseDate(r.addedTime)).filter(Boolean).sort((a,b)=>a-b);
  return{
    total:work.length,unique:uniq.length,dupes:work.length-uniq.length,
    cityData:Object.entries(cityCounts).sort((a,b)=>b[1]-a[1]),
    compData:Object.entries(compCounts).sort((a,b)=>a[0].localeCompare(b[0])),
    initData:Object.entries(initCounts).sort((a,b)=>b[1]-a[1]),
    desigData:Object.entries(desigCounts).sort((a,b)=>b[1]-a[1]),
    trend,uniqueRecords:uniq,
    lastReg:dates.length?dates[dates.length-1]:null,
    firstReg:dates.length?dates[0]:null
  };
}

function makeBars(data,colors,maxItems){
  const items=maxItems?data.slice(0,maxItems):data;
  if(!items.length)return '<div style="color:#94A0A8;font-size:13px;padding:10px 0">No data</div>';
  const max=items[0][1];
  return items.map(([label,count],i)=>`
    <div class="bar-row">
      <div class="bar-label left" title="${label}">${label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(count/max*100)}%;background:${colors[i%colors.length]}"></div>
      </div>
      <div class="bar-count">${count}</div>
    </div>`).join('');
}

function makeTrendSVG(trend){
  if(!trend.length)return '<div style="color:#94A0A8;font-size:13px;padding:20px 0;text-align:center">No data</div>';
  const W=800,H=160,PL=8,PR=8,PT=10,PB=30;
  const maxV=trend[trend.length-1].cum;
  const xs=trend.map((_,i)=>PL+(i/(trend.length-1||1))*(W-PL-PR));
  const ys=trend.map(d=>PT+(1-d.cum/maxV)*(H-PT-PB));
  const pts=xs.map((x,i)=>x+','+ys[i]).join(' ');
  const area=`${PL},${H-PB} `+pts+` ${W-PR},${H-PB}`;
  const ticks=trend.filter((_,i)=>i===0||i===trend.length-1||i%Math.ceil(trend.length/5)===0);
  const ticksX=ticks.map(t=>{const i=trend.indexOf(t);return`<text x="${xs[i]}" y="${H-8}" text-anchor="middle" font-size="10" fill="#94A0A8">${t.key}</text>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:180px">
    <defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6A39" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FF6A39" stop-opacity="0.02"/>
    </linearGradient></defs>
    <polygon points="${area}" fill="url(#g1)"/>
    <polyline points="${pts}" fill="none" stroke="#FF6A39" stroke-width="2.5" stroke-linejoin="round"/>
    ${ticksX}
    <text x="${W-PR}" y="${PT+8}" text-anchor="end" font-size="11" fill="#1B3A4B" font-weight="600">${maxV}</text>
  </svg>`;
}

function buildCityOptions(){
  const sel=document.getElementById('city-filter');
  const cur=sel.value;
  const cities=new Set();
  DATA.forEach(r=>cities.add((r.city||'Unspecified').trim()||'Unspecified'));
  sel.innerHTML='<option value="All">All cities</option>';
  Array.from(cities).sort().forEach(c=>{
    const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
  });
  if([...cities].includes(cur))sel.value=cur;
}

function render(){
  const city=document.getElementById('city-filter').value;
  const q=(document.getElementById('search').value||'').trim().toLowerCase();
  const s=computeStats(DATA,city);
  const pct=Math.min(100,Math.round(s.unique/TARGET*100));

  // Cards
  document.getElementById('cards').innerHTML=[
    {label:'Unique Registrations',val:s.unique,sub:`${pct}% of ${TARGET} target`,color:'#FF6A39',icon:'✅'},
    {label:'Total Submissions',val:s.total,sub:'including duplicates',color:'#1B3A4B',icon:'📋'},
    {label:'Duplicates',val:s.dupes,sub:'same email, multiple entries',color:'#C4582D',icon:'⚠️'},
    {label:'Cities',val:s.cityData.length,sub:s.cityData[0]?s.cityData[0][0]+' leads':'',color:'#3FA796',icon:'📍'},
    {label:'Last Registration',val:s.lastReg?s.lastReg.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):'—',
     sub:s.firstReg?'first on '+fmtDate(s.firstReg):'',color:'#8E6C88',icon:'🕐'},
  ].map(d=>`<div class="card">
    <div class="card-label">${d.label}<div class="card-icon" style="background:${d.color}22">${d.icon}</div></div>
    <div class="card-value">${d.val}</div>
    <div class="card-sub">${d.sub}</div>
  </div>`).join('');

  // Progress
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-label').textContent=s.unique+' / '+TARGET;

  // Charts
  document.getElementById('trend-wrap').innerHTML=makeTrendSVG(s.trend);
  document.getElementById('city-bars').innerHTML=makeBars(s.cityData,COLORS);
  document.getElementById('init-bars').innerHTML=makeBars(s.initData,['#3FA796'],8);
  document.getElementById('comp-count').textContent=s.compData.length;
  document.getElementById('comp-list').innerHTML=s.compData.map(([name,count])=>`
    <div class="company-row">
      <span class="company-name">${name}</span>
      ${count>1?'<span class="company-badge">'+count+' people</span>':''}
    </div>`).join('');
  document.getElementById('desig-bars').innerHTML=makeBars(s.desigData,COLORS,10);
  document.getElementById('desig-count').textContent=s.desigData.length+' unique';
  document.getElementById('desig-list').innerHTML=s.desigData.map(([name,count])=>`
    <div class="company-row">
      <span class="company-name">${name}</span>
      <span class="company-badge">${count}</span>
    </div>`).join('');

  // Table
  const filtered=s.uniqueRecords.filter(r=>!q||[r.name,r.email,r.company,r.designation,r.city].join(' ').toLowerCase().includes(q));
  document.getElementById('table-title').textContent='Registrant list ('+filtered.length+')';
  document.getElementById('tbody').innerHTML=filtered.slice(0,300).map(r=>{
    const d=parseDate(r.addedTime);
    return'<tr><td>'+( r.name||'')+'</td><td>'+(r.city||'')+'</td><td>'+(r.company||'')+'</td><td>'+(r.designation||'')+'</td><td class="muted">'+(r.email||'')+'</td><td class="muted">'+(d?fmtDate(d):'')+'</td></tr>';
  }).join('');
}

buildCityOptions();
render();
</script>
